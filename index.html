<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10110f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Van 3DGS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Van 3DGS WebGPU</title>
  </head>
  <body>
    <main class="stage">
      <canvas id="view" aria-label="Van 3D Gaussian splatting viewer"></canvas>
      <section class="hud" aria-live="polite">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Van 3DGS</h1>
            <p id="status">Loading</p>
          </div>
        </div>
        <div class="tools">
          <button id="openAsset" class="icon-button" type="button" title="Open local asset" aria-label="Open local asset">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z" />
              <path d="M12 11v5" />
              <path d="M9.5 13.5 12 11l2.5 2.5" />
            </svg>
          </button>
          <button id="orbit" class="icon-button active" type="button" title="Auto orbit" aria-label="Auto orbit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a8 8 0 0 1 13.7-5.7" />
              <path d="M18 2v5h-5" />
              <path d="M20 12a8 8 0 0 1-13.7 5.7" />
              <path d="M6 22v-5h5" />
            </svg>
          </button>
          <button id="reset" class="icon-button" type="button" title="Reset view" aria-label="Reset view">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v6h6" />
            </svg>
          </button>
        </div>
      </section>
      <section class="bottom-bar">
        <label>
          <span>Size</span>
          <input id="size" type="range" min="0.45" max="2.4" step="0.05" value="1.0" />
        </label>
        <span id="counter">0 splats</span>
      </section>
      <section id="message" class="message hidden"></section>
      <input id="assetInput" type="file" accept=".rtsp,application/octet-stream" hidden />
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
